<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  
                  cream: '#f2eae1',      
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        /* Heavy localized backdrop mask to isolate typography and your image */
        .portrait-glow {
            box-shadow: 0 0 60px 40px #1b3322;
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- Canvas for the Continuously Moving Zebra Stripe Field -->
        <canvas id="zebraCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center select-none">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border-2 border-brand-cream/20 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-125 brightness-90">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/70 opacity-0 translate-y-6 transition-all duration-1000 ease-out">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- Moving Zebra Fields Engine -->
    <script>
        // Simple 3D Perlin Noise implementation to handle the animation time vector smoothly
        const ZebraNoise = (function() {
            const p = new Uint8Array(256);
            for (let i=0; i<256; i++) p[i] = Math.floor(Math.random()*256);
            const perm = new Uint8Array(512);
            for (let i=0; i<512; i++) perm[i] = p[i & 255];
            
            return {
                noise3D: function(x, y, z) {
                    let X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                    x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                    let u = x*x*x*(x*(x*6-15)+10), v = y*y*y*(y*(y*6-15)+10), w = z*z*z*(z*(z*6-15)+10);
                    let A = perm[X]+Y, AA = perm[A]+Z, AB = perm[A+1]+Z, B = perm[X+1]+Y, BA = perm[B]+Z, BB = perm[B+1]+Z;
                    return lerp(w, lerp(v, lerp(u, grad(perm[AA], x, y, z), grad(perm[BA], x-1, y, z)),
                                           lerp(u, grad(perm[AB], x, y-1, z), grad(perm[BB], x-1, y-1, z))),
                                   lerp(v, lerp(u, grad(perm[AA+1], x, y, z-1), grad(perm[BA+1], x-1, y, z-1)),
                                           lerp(u, grad(perm[AB+1], x, y-1, z-1), grad(perm[BB+1], x-1, y-1, z-1))));
                }
            };
             Welsh
            function lerp(t, a, b) { return a + t * (b - a); }
            function grad(hash, x, y, z) {
                let h = hash & 15;
                let u = h<8 ? x : y, v = h<4 ? y : h==12||h==14 ? x : z;
                return ((h&1)? -u : u) + ((h&2)? -v : v);
            }
        })();

        const canvas = document.getElementById('zebraCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let animationTime = 0;

        // Configuration matching image_a0876c.jpg layout properties
        const stripeSpacing = 70; // Distance between seed rows
        const maxStripeLength = 320; 

        function drawZebraPattern(t) {
            ctx.clearRect(0, 0, width, height);
            
            const px = width / 2;
            const py = height / 2 - 40;

            // Generate parallel-running base vectors across the viewport grid
            for (let y = -50; y < height + 50; y += stripeSpacing) {
                ctx.beginPath();
                
                let isStarted = false;
                
                for (let x = -50; x < width + 50; x += 10) {
                    // Pull smooth, wide horizontal noise coordinates to get broad bands rather than thin wires
                    let noiseVal = ZebraNoise.noise3D(x * 0.0015, y * 0.002, t);
                    
                    // Add smooth vertical displacement math
                    let targetY = y + noiseVal * 160;

                    // Push smoothly around portrait container zone
                    const dx = x - px;
                    const dy = targetY - py;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        const force = (180 - dist) / 180;
                        targetY += (dy > 0 ? 1 : -1) * force * 50;
                    }

                    if (!isStarted) {
                        ctx.moveTo(x, targetY);
                        isStarted = true;
                    } else {
                        ctx.lineTo(x, targetY);
                    }
                }

                // Dynamic strip thickness logic to make the bands look painted/organic
                ctx.strokeStyle = '#f2eae1';
                ctx.lineWidth = 32 + Math.sin(y + t) * 12; // Bold, prominent bands matching the image
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = 0.95; 
                ctx.stroke();
            }
        }

        function renderLoop() {
            // Speed factor for the continuous moving effect (medium, steady motion)
            animationTime += 0.004; 
            
            drawZebraPattern(animationTime);
            requestAnimationFrame(renderLoop);
        }

        // Initialize and fire execution loop
        renderLoop();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // --- TYPOGRAPHY AND PORTRAIT REVEAL SEQUENCING ---
        window.addEventListener('DOMContentLoaded', () => {
            const portrait = document.getElementById('portrait-wrapper');
            const name = document.getElementById('hero-name');
            const tagline = document.getElementById('hero-tagline');

            setTimeout(() => {
                portrait.style.opacity = "1";
                portrait.style.transform = "scale(1)";
            }, 500);

            setTimeout(() => {
                name.style.opacity = "1";
                name.style.transform = "translateY(0)";
            }, 1300);

            setTimeout(() => {
                tagline.style.opacity = "1";
                tagline.style.transform = "translateY(0)";
            }, 1700);
        });
    </script>
</body>
</html>
