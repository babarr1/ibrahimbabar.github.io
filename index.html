<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    
    <!-- Premium Font Pairing (Playfair Display for headers, Inter for clean subtext) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN for quick, clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // Injecting the custom color palette from image_a182f4.png into Tailwind
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#2d4a36',  // Matte forest green background
                  cream: '#f2eae1',      // Soft vintage text color
                  sage: '#4a6b52'        // Line color
                }
              },
              fontFamily: {
                display: ['"Playfair Display"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        /* Extra custom styling for smooth rendering */
        body {
            background-color: #2d4a36;
            overflow-x: hidden;
        }
        .text-stroke {
            -webkit-text-stroke: 1px #f2eae1;
            color: transparent;
          }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- SVG Canvas for the Animated Spiral Lines -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" xmlns="http://www.w3.org/2000/svg">
            <!-- Path 1 (Left to center spiral) -->
            <path id="spiral-left" d="" fill="none" stroke="#f2eae1" stroke-width="1" opacity="0.4" stroke-dasharray="5 5" />
            <!-- Path 2 (Right to center spiral) -->
            <path id="spiral-right" d="" fill="none" stroke="#f2eae1" stroke-width="1" opacity="0.4" />
        </svg>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="relative w-48 h-48 md:w-56 md:h-56 rounded-full overflow-hidden border border-brand-cream/20 shadow-2xl mb-8 opacity-0 scale-95 transition-transform duration-700 ease-out">
                <!-- Replace 'your-image.jpg' with your photo path later -->
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Portrait" class="w-full h-full object-cover grayscale contrast-125 mix-blend-luminosity">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-2">
                <h1 id="hero-name" class="font-display text-4xl md:text-6xl font-bold tracking-tight opacity-0 translate-y-8">
                    Your Name
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-sm md:text-base font-medium tracking-widest uppercase text-brand-cream/70 opacity-0 translate-y-4">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- GSAP (GreenSock Animation Platform) for buttery smooth line and text transitions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        // Dynamic SVG Path Generator for Custom Spirals based on screen size
        function deploySpirals() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const cx = w / 2;
            const cy = h / 2 - 40; // Adjust slightly upwards toward the portrait center

            // Left complex line easing into a central spiral
            const pathLeft = `M 0,${h * 0.3} Q ${w * 0.25},${h * 0.1} ${w * 0.35},${cy} T ${cx - 40},${cy + 20} Q ${cx},${cy + 40} ${cx},${cy}`;
            // Right dynamic line wrapping around the edge
            const pathRight = `M ${w},${h * 0.7} Q ${w * 0.75},${h * 0.9} ${w * 0.65},${cy} T ${cx + 40},${cy - 20} Q ${cx},${cy - 40} ${cx},${cy}`;

            document.getElementById('spiral-left').setAttribute('d', pathLeft);
            document.getElementById('spiral-right').setAttribute('d', pathRight);
        }

        // Initialize curves
        deploySpirals();
        window.addEventListener('resize', deploySpirals);

        // --- ANIMATION SEQUENCE ---
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();

            // 1. Fade & smoothly pop the photo in the center
            tl.to("#portrait-wrapper", {
                opacity: 1,
                scale: 1,
                duration: 1.4,
                ease: "power4.out"
            });

            // 2. Animate the lines tracing/spiraling inward from the screen edges
            tl.fromTo("#spiral-left, #spiral-right", 
                { strokeDasharray: "1000", strokeDashoffset: "1000" },
                { strokeDashoffset: "0", duration: 2.2, ease: "power2.inOut" },
                "-=0.8" // Overlaps with portrait fade-in slightly
            );

            // 3. Smoothly slide up your Name and Tagline sequentially
            tl.to("#hero-name", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=1.0");

            tl.to("#hero-tagline", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=0.7");
        });
    </script>
</body>
</html>
