<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  
                  cream: '#f2eae1',      
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        /* Perfectly matches the background to drop your portrait seamlessly into the canvas layout */
        .portrait-glow {
            box-shadow: 0 0 60px 30px #1b3322;
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- Canvas for the High-Impact, Minimalist Non-Overlapping Zebra Patterns -->
        <canvas id="zebraCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center select-none">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border-2 border-brand-cream/20 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-125 brightness-90">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/70 opacity-0 translate-y-6 transition-all duration-1000 ease-out">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- Clean, Intelligent Non-Overlapping Vector Engine -->
    <script>
        const ZebraNoise = (function() {
            const p = new Uint8Array(256);
            for (let i=0; i<256; i++) p[i] = Math.floor(Math.random()*256);
            const perm = new Uint8Array(512);
            for (let i=0; i<512; i++) perm[i] = p[i & 255];
            
            return {
                noise: function(x, y) {
                    let X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
                    x -= Math.floor(x); y -= Math.floor(y);
                    let u = x * x * x * (x * (x * 6 - 15) + 10), v = y * y * y * (y * (y * 6 - 15) + 10);
                    let A = perm[X] + Y, B = perm[X + 1] + Y;
                    return lerp(v, lerp(u, grad(perm[A], x, y), grad(perm[B], x - 1, y)),
                               lerp(u, grad(perm[A + 1], x, y - 1), grad(perm[B + 1], x - 1, y - 1)));
                }
            };
            function lerp(t, a, b) { return a + t * (b - a); }
            function grad(hash, x, y) { return ((hash & 1) ? x : -x) + ((hash & 2) ? y : -y); }
        })();

        const canvas = document.getElementById('zebraCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // A global grid map tracking populated canvas space to enforce clean separation
        let collisionGrid = new Uint8Array(Math.ceil(width / 8) * Math.ceil(height / 8));
        const gridW = Math.ceil(width / 8);

        function checkAndMarkGrid(x, y, radius) {
            const gx = Math.floor(x / 8);
            const gy = Math.floor(y / 8);
            const rCells = Math.ceil(radius / 8);
            
            let collision = false;

            // Scan surrounding radius cells for nearby lines
            for (let dx = -rCells; dx <= rCells; dx++) {
                for (let dy = -rCells; dy <= rCells; dy++) {
                    const cx = gx + dx;
                    const cy = gy + dy;
                    if (cx >= 0 && cx < gridW && cy >= 0 && cy < Math.ceil(height / 8)) {
                        if (collisionGrid[cy * gridW + cx] === 1) {
                            collision = true;
                        }
                    }
                }
            }

            // If clean, mark the cells as claimed by this line
            if (!collision) {
                for (let dx = -rCells; dx <= rCells; dx++) {
                    for (let dy = -rCells; dy <= rCells; dy++) {
                        const cx = gx + dx;
                        const cy = gy + dy;
                        if (cx >= 0 && cx < gridW && cy >= 0 && cy < Math.ceil(height / 8)) {
                            collisionGrid[cy * gridW + cx] = 1;
                        }
                    }
                }
            }
            return collision;
        }

        class MinimalRibbon {
            constructor(startX, startY, originEdge) {
                this.points = [{x: startX, y: startY}];
                this.edge = originEdge;
                this.alive = true;
                this.speed = 4.0;
                // Thicker, graphic lines matching watermarked_img_635412397513879388.png
                this.thick = 14 + Math.random() * 12; 
            }

            grow(px, py) {
                if (!this.alive) return false;

                const last = this.points[this.points.length - 1];
                
                // Establish initial direction vectors
                let baseAngle;
                if (this.edge === 'left') baseAngle = 0;
                else if (this.edge === 'right') baseAngle = Math.PI;
                else if (this.edge === 'top') baseAngle = Math.PI / 2;
                else baseAngle = -Math.PI / 2;

                let noiseVal = ZebraNoise.noise(last.x * 0.003, last.y * 0.003);
                let angle = baseAngle + noiseVal * 1.4;

                // Push beautifully clear of portrait layout zone
                const dx = last.x - px;
                const dy = last.y - py;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    const force = (180 - dist) / 180;
                    angle += Math.atan2(dy, dx) * force * 1.5;
                }

                const nextX = last.x + Math.cos(angle) * this.speed;
                const nextY = last.y + Math.sin(angle) * this.speed;

                // Border boundaries
                if (nextX < 0 || nextX > width || nextY < 0 || nextY > height) {
                    this.alive = false;
                    return false;
                }

                // Strict isolation metric check. Stops growth if it approaches an existing stripe.
                const bufferDistance = this.thick + 14; 
                if (checkAndMarkGrid(nextX, nextY, bufferDistance)) {
                    this.alive = false;
                    return false;
                }

                this.points.push({x: nextX, y: nextY});
                return true;
            }

            draw() {
                if (this.points.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = '#f2eae1';
                ctx.lineWidth = this.thick;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = 0.85; 
                ctx.stroke();
            }
        }

        let ribbons = [];

        function initPattern() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            collisionGrid.fill(0);
            
            ribbons = [];
            ctx.clearRect(0, 0, width, height);

            // SIGNIFICANTLY REDUCED LINE COUNTS FOR A MINIMALIST TEXTURE
            // Space injection points far apart (100px increments)
            for (let y = 60; y < height; y += 100) {
                if(Math.random() > 0.4) ribbons.push(new MinimalRibbon(0, y, 'left'));
                if(Math.random() > 0.4) ribbons.push(new MinimalRibbon(width, y, 'right'));
            }
            for (let x = 60; x < width; x += 100) {
                if(Math.random() > 0.4) ribbons.push(new MinimalRibbon(x, 0, 'top'));
                if(Math.random() > 0.4) ribbons.push(new MinimalRibbon(x, height, 'bottom'));
            }
        }

        function buildTapestry() {
            ctx.clearRect(0, 0, width, height);
            
            const px = width / 2;
            const py = height / 2 - 40;

            let growing = false;
            ribbons.forEach(ribbon => {
                if (ribbon.grow(px, py)) {
                    growing = true;
                }
                ribbon.draw();
            });

            if (growing) {
                requestAnimationFrame(buildTapestry);
            }
        }

        initPattern();
        buildTapestry();

        window.addEventListener('resize', () => {
            initPattern();
            buildTapestry();
        });

        // --- TYPOGRAPHY AND PORTRAIT REVEAL SEQUENCING ---
        window.addEventListener('DOMContentLoaded', () => {
            const portrait = document.getElementById('portrait-wrapper');
            const name = document.getElementById('hero-name');
            const tagline = document.getElementById('hero-tagline');

            setTimeout(() => {
                portrait.style.opacity = "1";
                portrait.style.transform = "scale(1)";
            }, 500);

            setTimeout(() => {
                name.style.opacity = "1";
                name.style.transform = "translateY(0)";
            }, 1300);

            setTimeout(() => {
                tagline.style.opacity = "1";
                tagline.style.transform = "translateY(0)";
            }, 1700);
        });
    </script>
</body>
</html>
