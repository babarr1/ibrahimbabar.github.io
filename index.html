<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          darkMode: 'class', // Enables class-based dark mode toggling
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  
                  cream: '#f2eae1',      
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        /* Define theme transition behaviors smoothly */
        body {
            transition: background-color 0.8s cubic-bezier(0.25, 1, 0.5, 1), color 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .portrait-glow {
            transition: box-shadow 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Fade transition class for clean language switching */
        .lang-fade {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body class="bg-brand-darkGreen text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen dark:bg-brand-darkGreen dark:text-brand-cream">

    <!-- FIXED TOP NAV CONTROLS -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-6 md:px-12 pointer-events-none">
        <!-- Logo / Left side placeholder if needed -->
        <div class="text-xs tracking-[0.3em] uppercase pointer-events-auto opacity-70 hover:opacity-100 transition-opacity font-medium">IB</div>

        <!-- Minimalist Utility Controls Bundle -->
        <div class="flex items-center gap-6 pointer-events-auto">
            
            <!-- Language Changer (Typography Switcher) -->
            <button id="lang-toggle" class="text-xs font-medium tracking-widest uppercase opacity-60 hover:opacity-100 transition-opacity">
                <span id="lang-active">EN</span>
            </button>

            <!-- Light / Dark Mode Icon Toggle -->
            <button id="theme-toggle" class="w-5 h-5 flex items-center justify-center opacity-60 hover:opacity-100 transition-opacity focus:outline-none" aria-label="Toggle Theme">
                <!-- SVG Icon that morphs/renders dynamically based on current mode -->
                <svg id="theme-icon" class="w-full h-full stroke-current fill-none" stroke-width="1.5" viewBox="0 0 24 24">
                    <!-- Default: Moon shape -->
                    <path id="icon-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- SVG Canvas for the Mobile-Responsive Multi-Line Spiral -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" xmlns="http://www.w3.org/2000/svg">
            <g id="spiral-group"></g>
        </svg>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border border-brand-cream/10 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out" style="box-shadow: 0 0 60px 10px rgba(242, 234, 225, 0.03);">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-115 brightness-95">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out lang-fade">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/60 opacity-0 translate-y-6 transition-all duration-1000 ease-out delay-300 lang-fade">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- GSAP Animations & Core Script Setup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        const spiralGroup = document.getElementById('spiral-group');
        let currentTheme = 'dark'; // Track active UI environment
        let currentLang = 'EN';

        // Translation Dictionary (Easy to scale up with more elements or a dictionary file later)
        const translations = {
            EN: {
                tagline: "Creative Multidisciplinary"
            },
            UR: { // Urdu example—you can change this to any second language (e.g. TR for Turkish, etc.)
                tagline: "تخلیقی تکنیکی ماہر" 
            }
        };

        // Fetch stroke colors dynamically matching the current active theme
        function getStrokeColor() {
            return currentTheme === 'dark' ? '#f2eae1' : '#1b3322';
        }

        function generateMultiSpirals() {
            spiralGroup.innerHTML = ''; 

            const w = window.innerWidth;
            const h = window.innerHeight;
            const cx = w / 2;
            const cy = h / 2 - 40; 
            const isMobile = w < 768;

            const lineCount = isMobile ? 10 : 6;        
            const offsetSpacing = isMobile ? 6 : 12;   
            const strokeColor = getStrokeColor();

            for (let i = 0; i < lineCount; i++) {
                const step = i * offsetSpacing;
                let dLeft, dRight;

                if (isMobile) {
                    dLeft = `M -40,${h * 0.1 + step * 2} C ${w * 0.45},${h * 0.02 + step} ${0 - step},${cy - 60} ${cx - 45 + step * 0.3},${cy - 25} Q ${cx},${cy + 45 - step * 0.4} ${cx},${cy}`;
                    dRight = `M ${w + 40},${h * 0.9 - step * 2} C ${w * 0.55},${h * 0.98 - step} ${w + step},${cy + 60} ${cx + 45 - step * 0.3},${cy + 25} Q ${cx},${cy - 45 + step * 0.4} ${cx},${cy}`;
                } else {
                    dLeft = `M -50,${h * 0.2 + step} Q ${w * 0.22},${h * 0.05 + step} ${w * 0.33},${cy - step * 0.5} T ${cx - 50 + step * 0.3},${cy + 30 - step * 0.2} Q ${cx},${cy + 50 - step} ${cx},${cy}`;
                    dRight = `M ${w + 50},${h * 0.8 - step} Q ${w * 0.78},${h * 0.95 - step} ${w * 0.67},${cy + step * 0.5} T ${cx + 50 - step * 0.3},${cy - 30 + step * 0.2} Q ${cx},${cy - 50 + step} ${cx},${cy}`;
                }

                const pathLeft = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathLeft.setAttribute('d', dLeft);
                pathLeft.setAttribute('fill', 'none');
                pathLeft.setAttribute('stroke', strokeColor);
                pathLeft.setAttribute('stroke-width', i === 0 ? '1.25' : '0.75');
                pathLeft.setAttribute('opacity', (isMobile ? 0.38 - (i * 0.035) : 0.4 - (i * 0.05)).toString());
                pathLeft.setAttribute('class', 'spiral-line');
                spiralGroup.appendChild(pathLeft);

                const pathRight = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathRight.setAttribute('d', dRight);
                pathRight.setAttribute('fill', 'none');
                pathRight.setAttribute('stroke', strokeColor);
                pathRight.setAttribute('stroke-width', i === 0 ? '1.25' : '0.75');
                pathRight.setAttribute('opacity', (isMobile ? 0.38 - (i * 0.035) : 0.4 - (i * 0.05)).toString());
                pathRight.setAttribute('class', 'spiral-line');
                spiralGroup.appendChild(pathRight);
            }
        }

        // --- THEME SWITCHER CONTROLLER ---
        const themeToggle = document.getElementById('theme-toggle');
        const iconPath = document.getElementById('icon-path');

        themeToggle.addEventListener('click', () => {
            const documentBody = document.body;
            
            if (currentTheme === 'dark') {
                // Shift to Light Mode
                currentTheme = 'light';
                documentBody.classList.remove('bg-brand-darkGreen', 'text-brand-cream', 'dark:bg-brand-darkGreen', 'dark:text-brand-cream');
                documentBody.classList.add('bg-brand-cream', 'text-brand-darkGreen');
                
                // Animate/Morph theme icon to a Sun shape
                iconPath.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z');
            } else {
                // Shift back to Dark Mode
                currentTheme = 'dark';
                documentBody.classList.remove('bg-brand-cream', 'text-brand-darkGreen');
                documentBody.classList.add('bg-brand-darkGreen', 'text-brand-cream');
                
                // Morph icon back to a Moon crescent shape
                iconPath.setAttribute('d', 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z');
            }

            // Instantly re-render vector lines with the correct inverted contrast hex value
            generateMultiSpirals();
        });

        // --- MULTI-LANGUAGE CONTROLLER ---
        const langToggle = document.getElementById('lang-toggle');
        const langActive = document.getElementById('lang-active');
        const heroTagline = document.getElementById('hero-tagline');

        langToggle.addEventListener('click', () => {
            // Toggle local state strings
            currentLang = currentLang === 'EN' ? 'UR' : 'EN';
            langActive.innerText = currentLang;

            // Fluidly drop opacity to mask text layout shift
            heroTagline.style.opacity = '0';
            heroTagline.style.transform = 'translateY(10px)';

            setTimeout(() => {
                // Inject target localized content string values
                heroTagline.innerText = translations[currentLang].tagline;
                
                // Pop visibility back smoothly
                heroTagline.style.opacity = '0.7';
                heroTagline.style.transform = 'translateY(0)';
            }, 300);
        });

        // --- ANIMATION INITIALIZER ---
        generateMultiSpirals();
        window.addEventListener('resize', generateMultiSpirals);

        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();

            tl.to("#portrait-wrapper", {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                ease: "power4.out"
            });

            tl.fromTo(".spiral-line", 
                { strokeDasharray: "2000", strokeDashoffset: "2000" },
                { strokeDashoffset: "0", duration: 2.2, ease: "power2.inOut", stagger: 0.07 },
                "-=0.9"
            );

            tl.to("#hero-name", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=1.2");

            tl.to("#hero-tagline", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=0.9");
        });
    </script>
</body>
</html>
