<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN & Structural Style Sheet Link -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  
                  cream: '#f2eae1',      
                  beige: '#e6ded4',      
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>
</head>
<body class="bg-brand-darkGreen text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen hidden-cursor">

    <!-- CUSTOM FUN INTERACTIVE CURSOR -->
    <div id="custom-cursor"></div>
    <div id="custom-cursor-dot"></div>

    <!-- BACKGROUND ENGINE SYSTEMS -->
    <div class="fixed inset-0 grid-overlay pointer-events-none z-0"></div>
    <canvas id="bgPatternCanvas" class="fixed inset-0 w-full h-full pointer-events-none z-0 opacity-20"></canvas>

    <!-- FIXED TOP NAV CONTROLS -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-6 md:px-12 pointer-events-none">
        <div class="text-xs tracking-[0.3em] uppercase pointer-events-auto opacity-70 font-medium">IB</div>
        <div class="flex items-center gap-8 pointer-events-auto">
            <div class="relative inline-block text-left">
                <button id="lang-menu-btn" class="text-xs font-medium tracking-widest uppercase opacity-60 hover:opacity-100 flex items-center gap-1.5 focus:outline-none">
                    <span id="lang-active">EN</span>
                    <svg class="w-2.5 h-2.5 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="lang-dropdown" class="absolute right-0 mt-3 w-20 rounded-md shadow-xl bg-brand-cream text-brand-darkGreen border border-brand-darkGreen/10 py-1 opacity-0 pointer-events-none translate-y-[-10px] transition-all duration-200">
                    <button class="lang-opt w-full text-left px-4 py-2 text-xs font-medium tracking-wider hover:bg-brand-darkGreen/10" data-lang="EN">EN</button>
                    <button class="lang-opt w-full text-left px-4 py-2 text-xs font-medium tracking-wider hover:bg-brand-darkGreen/10" data-lang="UR">UR</button>
                    <button class="lang-opt w-full text-left px-4 py-2 text-xs font-medium tracking-wider hover:bg-brand-darkGreen/10" data-lang="TR">TR</button>
                </div>
            </div>
            <button id="theme-toggle" class="w-5 h-5 flex items-center justify-center opacity-60 hover:opacity-100 focus:outline-none">
                <svg class="w-full h-full stroke-current fill-none" stroke-width="1.5" viewBox="0 0 24 24">
                    <path id="icon-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center px-6 z-10">
        <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" xmlns="http://www.w3.org/2000/svg">
            <g id="spiral-group"></g>
        </svg>

        <div class="relative flex flex-col items-center max-w-4xl text-center">
            <div id="portrait-wrapper" class="relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border border-brand-cream/10 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-115">
            </div>
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/60 opacity-0 translate-y-6 transition-all duration-1000 ease-out">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>
    </section>

    <!-- INSTAGRAM TACTILE STACK SECTION -->
    <section class="relative w-full min-h-screen py-32 px-6 flex flex-col items-center justify-center z-10">
        <div class="max-w-xl text-center mb-16 select-none">
            <p class="text-xs tracking-[0.3em] uppercase opacity-50 mb-3">Digital Storytelling</p>
            <h2 class="font-display text-3xl md:text-5xl font-medium tracking-tight">From My Grid</h2>
        </div>

        <!-- Tactile Deck Container -->
        <div class="relative w-72 h-96 mb-16 perspective-container flex items-center justify-center">
            <!-- Card 3 (Bottom) -->
            <div class="polaroid-card stack-card absolute bg-brand-cream text-brand-darkGreen p-4 pb-8 shadow-xl w-72 h-96 flex flex-col justify-between" style="--index: 2;">
                <div class="w-full h-72 overflow-hidden bg-brand-darkGreen/5">
                    <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover grayscale">
                </div>
                <div class="font-display italic text-center text-sm pt-4 tracking-wide opacity-80">feline framework.</div>
            </div>
            <!-- Card 2 (Middle) -->
            <div class="polaroid-card stack-card absolute bg-brand-cream text-brand-darkGreen p-4 pb-8 shadow-xl w-72 h-96 flex flex-col justify-between" style="--index: 1;">
                <div class="w-full h-72 overflow-hidden bg-brand-darkGreen/5">
                    <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover grayscale">
                </div>
                <div class="font-display italic text-center text-sm pt-4 tracking-wide opacity-80">captured moments.</div>
            </div>
            <!-- Card 1 (Top) -->
            <div class="polaroid-card stack-card absolute bg-brand-cream text-brand-darkGreen p-4 pb-8 shadow-xl w-72 h-96 flex flex-col justify-between cursor-pointer" style="--index: 0;">
                <div class="w-full h-72 overflow-hidden bg-brand-darkGreen/5">
                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover grayscale">
                </div>
                <div class="font-display italic text-center text-sm pt-4 tracking-wide opacity-80">stray companion.</div>
            </div>
        </div>

        <!-- Dynamic Instagram Interactive Handle -->
        <a href="https://instagram.com" target="_blank" class="instagram-link group flex items-center gap-3 px-6 py-3.5 rounded-full border border-brand-cream/20 bg-brand-cream/5 backdrop-blur-md transition-all duration-300 hover:bg-brand-cream hover:text-brand-darkGreen hover:border-brand-cream">
            <svg class="w-5 h-5 fill-none stroke-current" stroke-width="1.5" viewBox="0 0 24 24">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <span class="text-xs font-semibold tracking-[0.2em] uppercase">follow me on instagram</span>
        </a>
    </section>

    <!-- Animation Dependencies CDN Links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
