<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  // Matte forest green background from image_a182f4.png
                  cream: '#f2eae1',      // Vintage soft cream text
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        /* Crisp masking shadow to drop your picture seamlessly into the pattern */
        .portrait-glow {
            box-shadow: 0 0 50px 25px #1b3322;
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- Canvas for the Sharp, Organic Zebra Ribbon Pattern -->
        <canvas id="zebraCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center select-none">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border-2 border-brand-cream/20 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-125 brightness-90">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/70 opacity-0 translate-y-6 transition-all duration-1000 ease-out">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- Mathematics Engine for Static Zebra-Print Formations -->
    <script>
        // Static noise generation logic (no time parameters = zero glitching)
        const ZebraNoise = (function() {
            const p = new Uint8Array(256);
            for (let i=0; i<256; i++) p[i] = Math.floor(Math.random()*256);
            const perm = new Uint8Array(512);
            for (let i=0; i<512; i++) perm[i] = p[i & 255];
            
            return {
                noise: function(x, y) {
                    let X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
                    x -= Math.floor(x); y -= Math.floor(y);
                    let u = x * x * x * (x * (x * 6 - 15) + 10), v = y * y * y * (y * (y * 6 - 15) + 10);
                    let A = perm[X] + Y, B = perm[X + 1] + Y;
                    return lerp(v, lerp(u, grad(perm[A], x, y), grad(perm[B], x - 1, y)),
                               lerp(u, grad(perm[A + 1], x, y - 1), grad(perm[B + 1], x - 1, y - 1)));
                }
            };
            function lerp(t, a, b) { return a + t * (b - a); }
            function grad(hash, x, y) { return ((hash & 1) ? x : -x) + ((hash & 2) ? y : -y); }
        })();

        const canvas = document.getElementById('zebraCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        class ZebraRibbon {
            constructor(startX, startY, originEdge) {
                this.points = [{x: startX, y: startY}];
                this.edge = originEdge; // 'top', 'bottom', 'left', 'right'
                this.currentLength = 0;
                this.maxLength = Math.max(width, height) * 0.65; 
                this.speed = 4.5; // Medium, clean speed injection
                this.thick = 6 + Math.random() * 12; // Thick/thin variance matching natural zebra pattern stripes
            }

            grow(px, py) {
                if (this.currentLength >= this.maxLength) return false;

                const last = this.points[this.points.length - 1];
                
                // Get directional flow logic
                let baseAngle;
                if (this.edge === 'left') baseAngle = 0;
                else if (this.edge === 'right') baseAngle = Math.PI;
                else if (this.edge === 'top') baseAngle = Math.PI / 2;
                else baseAngle = -Math.PI / 2;

                // Layer organic waving offsets over the base directions
                let noiseVal = ZebraNoise.noise(last.x * 0.004, last.y * 0.004);
                let angle = baseAngle + noiseVal * 1.5;

                // Push away gracefully from your center portrait coordinate
                const dx = last.x - px;
                const dy = last.y - py;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    const force = (180 - dist) / 180;
                    angle += Math.atan2(dy, dx) * force * 1.3;
                }

                const nextX = last.x + Math.cos(angle) * this.speed;
                const nextY = last.y + Math.sin(angle) * this.speed;

                this.points.push({x: nextX, y: nextY});
                this.currentLength += this.speed;
                return true;
            }

            draw() {
                if (this.points.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = '#f2eae1';
                ctx.lineWidth = this.thick;
                ctx.lineCap = 'round';
                ctx.globalAlpha = 0.65; // Highly visible, rich cream ribbon structure
                ctx.stroke();
            }
        }

        let ribbons = [];

        function initPattern() {
            ribbons = [];
            ctx.clearRect(0, 0, width, height);

            // Left & Right Injectors
            for (let y = 0; y < height; y += 40) {
                if(Math.random() > 0.25) ribbons.push(new ZebraRibbon(0, y, 'left'));
                if(Math.random() > 0.25) ribbons.push(new ZebraRibbon(width, y, 'right'));
            }
            // Top & Bottom Injectors
            for (let x = 0; x < width; x += 40) {
                if(Math.random() > 0.25) ribbons.push(new ZebraRibbon(x, 0, 'top'));
                if(Math.random() > 0.25) ribbons.push(new ZebraRibbon(x, height, 'bottom'));
            }
        }

        function buildTapestry() {
            ctx.clearRect(0, 0, width, height);
            
            const px = width / 2;
            const py = height / 2 - 40;

            let growing = false;
            ribbons.forEach(ribbon => {
                if (ribbon.grow(px, py)) {
                    growing = true;
                }
                ribbon.draw();
            });

            // Re-run framing loop only while segments are processing. 
            // Once they reach max lengths, computation drops to 0% CPU footprint.
            if (growing) {
                requestAnimationFrame(buildTapestry);
            }
        }

        initPattern();
        buildTapestry();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initPattern();
            buildTapestry();
        });

        // --- TYPOGRAPHY AND PORTRAIT REVEAL SEQUENCING ---
        window.addEventListener('DOMContentLoaded', () => {
            const portrait = document.getElementById('portrait-wrapper');
            const name = document.getElementById('hero-name');
            const tagline = document.getElementById('hero-tagline');

            setTimeout(() => {
                portrait.style.opacity = "1";
                portrait.style.transform = "scale(1)";
            }, 500);

            setTimeout(() => {
                name.style.opacity = "1";
                name.style.transform = "translateY(0)";
            }, 1300);

            setTimeout(() => {
                tagline.style.opacity = "1";
                tagline.style.transform = "translateY(0)";
            }, 1700);
        });
    </script>
</body>
</html>
