<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter Vibes) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  // Deep organic forest green matching your image
                  cream: '#f2eae1',      // Vintage soft cream text
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        .portrait-glow {
            box-shadow: 0 0 60px 10px rgba(242, 234, 225, 0.03);
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- Canvas for the Minimalist Hokusai-Style Wave Lines -->
        <canvas id="waveCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-25"></canvas>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-48 h-48 md:w-56 md:h-56 rounded-full overflow-hidden border border-brand-cream/10 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <!-- Placeholder portrait (Replace with your own file path later) -->
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-115 brightness-95">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/60 opacity-0 translate-y-6 transition-all duration-1000 ease-out delay-300">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- Mathematical Wave Engine Script -->
    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Wave Layer definition to mimic traditional woodblock overlay line art
        class WaveLayer {
            constructor(baseY, amplitude, frequency, speed, color, lineSpacing, totalLines) {
                this.baseY = baseY;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.color = color;
                this.lineSpacing = lineSpacing; // Gap between thin contour vector strokes
                this.totalLines = totalLines;   // Number of nested parallel lines per ridge
                this.time = 0;
            }

            draw() {
                this.time += this.speed;

                for (let j = 0; j < this.totalLines; j++) {
                    ctx.beginPath();
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = this.color;
                    // Outer waves are finer and more transparent
                    ctx.globalAlpha = (1 - (j / this.totalLines)) * 0.4; 

                    const offset = j * this.lineSpacing;

                    for (let x = 0; x <= width; x += 4) {
                        // Creating a localized Hokusai crest peak near the screen center alignment
                        const centerInfluence = Math.exp(-Math.pow((x - width / 2) / (width * 0.3), 2));
                        
                        // Combining multiple sine inputs to create stylized Japanese wave geometry
                        const primaryWave = Math.sin(x * this.frequency + this.time) * this.amplitude;
                        const crestPeak = Math.sin(x * (this.frequency * 2.5) - this.time * 1.5) * (this.amplitude * 0.4) * centerInfluence;
                        
                        const y = this.baseY + primaryWave + crestPeak - offset - (centerInfluence * 30);

                        if (x === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                }
            }
        }

        // Generating three overlapping stylized wave systems (Background, Midground, Foreground peaks)
        const waves = [
            new WaveLayer(height * 0.55, 35, 0.003, 0.025, '#f2eae1', 8, 5),
            new WaveLayer(height * 0.50, 45, 0.004, -0.018, '#f2eae1', 6, 6),
            new WaveLayer(height * 0.45, 25, 0.006, 0.035, '#f2eae1', 10, 4)
        ];

        function animateWaves() {
            ctx.clearRect(0, 0, width, height);
            waves.forEach(wave => wave.draw());
            requestAnimationFrame(animateWaves);
        }

        animateWaves();

        // --- TYPOGRAPHY AND PORTRAIT REVEAL SEQUENCING ---
        window.addEventListener('DOMContentLoaded', () => {
            const portrait = document.getElementById('portrait-wrapper');
            const name = document.getElementById('hero-name');
            const tagline = document.getElementById('hero-tagline');

            setTimeout(() => {
                portrait.style.opacity = "1";
                portrait.style.transform = "scale(1)";
            }, 300);

            setTimeout(() => {
                name.style.opacity = "1";
                name.style.transform = "translateY(0)";
            }, 900);

            setTimeout(() => {
                tagline.style.opacity = "1";
                tagline.style.transform = "translateY(0)";
            }, 1300);
        });
    </script>
</body>
</html>
