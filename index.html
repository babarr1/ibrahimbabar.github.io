<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  // Deep organic forest green matching your image
                  cream: '#f2eae1',      // Vintage soft cream text
                  sage: '#3a5f43'        // Elegant mid-tone for subtle structural lines
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        /* Slow pulsing glow behind your portrait */
        .portrait-glow {
            box-shadow: 0 0 60px 10px rgba(242, 234, 225, 0.04);
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <canvas id="patternCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-40"></canvas>

        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center">
            
            <div id="portrait-wrapper" class="portrait-glow relative w-48 h-48 md:w-56 md:h-56 rounded-full overflow-hidden border border-brand-cream/10 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-115 brightness-95">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/60 opacity-0 translate-y-6 transition-all duration-1000 ease-out delay-300">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <script>
        const canvas = document.getElementById('patternCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Procedural Branch Object definition
        class Branch {
            constructor(startX, startY, angle, length, width, generation) {
                this.startX = startX;
                this.startY = startY;
                this.currentX = startX;
                this.currentY = startY;
                this.angle = angle;
                this.length = length;
                this.width = width;
                this.generation = generation;
                
                this.progress = 0;
                // Controls how slowly the branches extend. Lower numbers = slower, more seamless growth
                this.speed = 0.004 / (generation * 0.6 + 1); 
                this.hasSplit = false;
            }

            update() {
                if (this.progress < 1) {
                    this.progress += this.speed;
                    if (this.progress > 1) this.progress = 1;

                    // Project forward using trigonometry
                    const currentLength = this.length * this.progress;
                    this.currentX = this.startX + Math.cos(this.angle) * currentLength;
                    this.currentY = this.startY + Math.sin(this.angle) * currentLength;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.currentX, this.currentY);
                ctx.strokeStyle = '#f2eae1';
                ctx.lineWidth = this.width;
                ctx.globalAlpha = 0.15 + (1 / this.generation * 0.15); // Fine details fade gracefully
                ctx.stroke();
            }
        }

        let activeBranches = [];
        const maxGenerations = 5;

        function initPattern() {
            activeBranches = [];
            const centerX = width / 2;
            const centerY = height / 2 - 40; // Pinning growth baseline to target your portrait area

            // Roots growing slowly inward from Left Screen Boundary
            activeBranches.push(new Branch(0, height * 0.4, 0.05, width * 0.2, 1.5, 1));
            activeBranches.push(new Branch(0, height * 0.6, -0.05, width * 0.2, 1.5, 1));

            // Roots growing slowly inward from Right Screen Boundary
            activeBranches.push(new Branch(width, height * 0.35, Math.PI - 0.08, width * 0.2, 1.5, 1));
            activeBranches.push(new Branch(width, height * 0.65, Math.PI + 0.08, width * 0.2, 1.5, 1));
            
            // Sub-structural core lines emerging near the center layout base
            activeBranches.push(new Branch(centerX - 100, height, -Math.PI/2 - 0.2, height * 0.3, 1.8, 1));
            activeBranches.push(new Branch(centerX + 100, height, -Math.PI/2 + 0.2, height * 0.3, 1.8, 1));
        }

        function animateCanvas() {
            // Clean slate canvas redraw loop
            ctx.clearRect(0, 0, width, height);

            let ongoingGrowth = false;

            activeBranches.forEach(branch => {
                branch.update();
                branch.draw();

                if (branch.progress < 1) {
                    ongoingGrowth = true;
                }

                // Sprout architectural child paths once parents reach maturity
                if (branch.progress >= 1 && !branch.hasSplit && branch.generation < maxGenerations) {
                    branch.hasSplit = true;
                    
                    // Create beautiful bifurcations (splits) 
                    const branchCount = Math.random() > 0.4 ? 2 : 3;
                    for (let i = 0; i < branchCount; i++) {
                        // Complex paths organic bending logic toward portrait center frame
                        const targetAngle = Math.atan2((height/2 - 40) - branch.currentY, (width/2) - branch.currentX);
                        const angleOffset = (Math.random() - 0.5) * 1.1; 
                        const finalAngle = targetAngle * 0.6 + branch.angle * 0.4 + angleOffset;

                        const nextLength = branch.length * (0.6 + Math.random() * 0.25);
                        const nextWidth = branch.width * 0.75;

                        activeBranches.push(new Branch(
                            branch.currentX, 
                            branch.currentY, 
                            finalAngle, 
                            nextLength, 
                            nextWidth, 
                            branch.generation + 1
                        ));
                    }
                }
            });

            requestAnimationFrame(animateCanvas);
        }

        // Trigger Canvas initialization
        initPattern();
        animateCanvas();

        // --- TYPOGRAPHY AND PORTRAIT REVEAL SEQUENCING ---
        window.addEventListener('DOMContentLoaded', () => {
            const portrait = document.getElementById('portrait-wrapper');
            const name = document.getElementById('hero-name');
            const tagline = document.getElementById('hero-tagline');

            // Synchronized modern layout entry transitions
            setTimeout(() => {
                portrait.style.opacity = "1";
                portrait.style.transform = "scale(1)";
            }, 400);

            setTimeout(() => {
                name.style.opacity = "1";
                name.style.transform = "translateY(0)";
            }, 1200);

            setTimeout(() => {
                tagline.style.opacity = "1";
                tagline.style.transform = "translateY(0)";
            }, 1600);
        });
    </script>
</body>
</html>
