<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  // Matte forest green background from image_a182f4.png
                  cream: '#f2eae1',      // Vintage soft cream text
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        /* Heavy backdrop shadow to punch the portrait cleanly above the busy line field */
        .portrait-glow {
            box-shadow: 0 0 40px 20px #1b3322;
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- Canvas for the Razor-Sharp Topographical Woodblock Flow Lines -->
        <canvas id="flowCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center select-none">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border-2 border-brand-cream/30 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <!-- Replace src with your image path later -->
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-125 brightness-90">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out drop-shadow-[0_4px_12px_rgba(27,51,34,0.8)]">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/70 opacity-0 translate-y-6 transition-all duration-1000 ease-out drop-shadow-[0_2px_6px_rgba(27,51,34,0.8)]">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- Simplex Vector Noise Logic for Continuous Woodblock Textures -->
    <script>
        const Noise = (function() {
            const F2 = 0.5 * (Math.sqrt(3.0) - 1.0);
            const G2 = (3.0 - Math.sqrt(3.0)) / 6.0;
            const p = new Uint8Array(256);
            for (let i=0; i<256; i++) p[i] = Math.floor(Math.random()*256);
            const perm = new Uint8Array(512);
            const permMod12 = new Uint8Array(512);
            for (let i=0; i<512; i++) {
                perm[i] = p[i & 255];
                permMod12[i] = (perm[i] % 12);
            }
            return {
                noise3D: function(xin, yin, zin) {
                    // Quick pseudo-3D noise calculation to allow smooth time-based movement
                    let n0, n1, n2;
                    let s = (xin + yin) * F2;
                    let i = Math.floor(xin + s);
                    let j = Math.floor(yin + s);
                    let t = (i + j) * G2;
                    let X0 = i - t;
                    let Y0 = j - t;
                    let x0 = xin - X0;
                    let y0 = yin - Y0;
                    let i1, j1;
                    if (x0 > y0) { i1 = 1; j1 = 0; } else { i1 = 0; j1 = 1; }
                    let x1 = x0 - i1 + G2;
                    let y1 = y0 - j1 + G2;
                    let x2 = x0 - 1.0 + 2.0 * G2;
                    let y2 = y0 - 1.0 + 2.0 * G2;
                    let ii = i & 255;
                    let jj = j & 255;
                    let gi0 = permMod12[ii + perm[jj]];
                    let gi1 = permMod12[ii + i1 + perm[jj + j1]];
                    let gi2 = permMod12[ii + 1 + perm[jj + 1]];
                    let t0 = 0.5 - x0 * x0 - y0 * y0;
                    if (t0 < 0) n0 = 0.0;
                    else { t0 *= t0; n0 = t0 * t0 * (gi0 % 2 === 0 ? 1 : -1) * x0 + (gi0 % 4 === 0 ? 1 : -1) * y0; }
                    let t1 = 0.5 - x1 * x1 - y1 * y1;
                    if (t1 < 0) n1 = 0.0;
                    else { t1 *= t1; n1 = t1 * t1 * (gi1 % 2 === 0 ? 1 : -1) * x1 + (gi1 % 4 === 0 ? 1 : -1) * y1; }
                    let t2 = 0.5 - x2 * x2 - y2 * y2;
                    if (t2 < 0) n2 = 0.0;
                    else { t2 *= t2; n2 = t2 * t2 * (gi2 % 2 === 0 ? 1 : -1) * x2 + (gi2 % 4 === 0 ? 1 : -1) * y2; }
                    return 70.0 * (n0 + n1 + n2) + Math.sin(zin) * 0.2;
                }
            };
        })();

        const canvas = document.getElementById('flowCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let timeOffset = 0;

        class Streamline {
            constructor(x, y) {
                this.seedX = x;
                this.seedY = y;
                this.maxLength = 140; // Intentionally contained lengths to preserve fine woodblock ridge details
                this.speed = 3.0;     
            }

            draw(px, py, t) {
                ctx.beginPath();
                ctx.moveTo(this.seedX, this.seedY);

                let curX = this.seedX;
                let curY = this.seedY;

                for (let i = 0; i < this.maxLength; i++) {
                    // Scaled calculation for ultra-sharp ridge frequencies
                    let angle = Noise.noise3D(curX * 0.0028, curY * 0.0028, t) * Math.PI * 2.5;

                    // Deflection barrier around your portrait center point
                    const dx = curX - px;
                    const dy = curY - py;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 160) {
                        const force = (160 - dist) / 160;
                        angle += Math.atan2(dy, dx) * force * 1.2; 
                    }

                    curX += Math.cos(angle) * this.speed;
                    curY += Math.sin(angle) * this.speed;

                    // Stop plotting lines if they exit borders
                    if (curX < 0 || curX > width || curY < 0 || curY > height) break;
                    
                    ctx.lineTo(curX, curY);
                }

                ctx.strokeStyle = '#f2eae1';
                ctx.lineWidth = 1.75;    // Balanced width for crisp rendering on high-res displays
                ctx.globalAlpha = 0.28;  // High visibility contrast for crisp lines
                ctx.stroke();
            }
        }

        let streamlines = [];
        const isMobile = width < 768;
        const totalStreams = isMobile ? 220 : 500; // Optimal density spacing for grid rendering

        function initFlowField() {
            streamlines = [];
            // Space seeds on a loose structured grid matrix instead of raw randomness
            const spacing = isMobile ? 35 : 45;
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    // Inject minor jitter so it looks perfectly organic
                    streamlines.push(new Streamline(
                        x + (Math.random() - 0.5) * 15,
                        y + (Math.random() - 0.5) * 15
                    ));
                }
            }
        }

        function runEngine() {
            ctx.clearRect(0, 0, width, height);
            
            const px = width / 2;
            const py = height / 2 - 40;

            // Slow time vector incremental changes that cause lines to twist and roll smoothly
            timeOffset += 0.0018; 

            streamlines.forEach(stream => {
                stream.draw(px, py, timeOffset);
            });

            requestAnimationFrame(runEngine);
        }

        initFlowField();
        runEngine();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initFlowField();
        });

        // --- TYPOGRAPHY AND PORTRAIT REVEAL SEQUENCING ---
        window.addEventListener('DOMContentLoaded', () => {
            const portrait = document.getElementById('portrait-wrapper');
            const name = document.getElementById('hero-name');
            const tagline = document.getElementById('hero-tagline');

            setTimeout(() => {
                portrait.style.opacity = "1";
                portrait.style.transform = "scale(1)";
            }, 400);

            setTimeout(() => {
                name.style.opacity = "1";
                name.style.transform = "translateY(0)";
            }, 1200);

            setTimeout(() => {
                tagline.style.opacity = "1";
                tagline.style.transform = "translateY(0)";
            }, 1600);
        });
    </script>
</body>
</html>
