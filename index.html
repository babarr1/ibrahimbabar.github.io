<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Babar — Portfolio</title>
    
    <!-- Premium Font Pairing (Fraunces & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  darkGreen: '#1b3322',  // Matte forest green background from image_a182f4.png
                  cream: '#f2eae1',      // Vintage soft cream
                }
              },
              fontFamily: {
                display: ['"Fraunces"', 'serif'],
                body: ['"Inter"', 'sans-serif']
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #1b3322;
            overflow-x: hidden;
        }
        .portrait-glow {
            box-shadow: 0 0 60px 10px rgba(242, 234, 225, 0.03);
        }
    </style>
</head>
<body class="text-brand-cream font-body antialiased selection:bg-brand-cream selection:text-brand-darkGreen">

    <!-- HERO SECTION -->
    <section class="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden px-6">
        
        <!-- SVG Canvas for the Mobile-Responsive Multi-Line Spiral -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" xmlns="http://www.w3.org/2000/svg">
            <g id="spiral-group"></g>
        </svg>

        <!-- Centered Core Elements -->
        <div class="relative z-10 flex flex-col items-center max-w-4xl text-center">
            
            <!-- Portrait Container -->
            <div id="portrait-wrapper" class="portrait-glow relative w-44 h-44 md:w-52 md:h-52 rounded-full overflow-hidden border border-brand-cream/10 shadow-2xl mb-8 opacity-0 scale-95 transition-all duration-1000 ease-out">
                <img id="portrait" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=600" alt="Ibrahim Babar" class="w-full h-full object-cover grayscale contrast-115 brightness-95">
                <div class="absolute inset-0 bg-brand-darkGreen/10 mix-blend-multiply"></div>
            </div>

            <!-- Typography Reveal Area -->
            <div class="overflow-hidden mb-3">
                <h1 id="hero-name" class="font-display text-5xl md:text-7xl font-semibold tracking-tight opacity-0 translate-y-12 transition-all duration-1000 ease-out">
                    Ibrahim Babar
                </h1>
            </div>
            
            <div class="overflow-hidden">
                <p id="hero-tagline" class="text-xs md:text-sm font-medium tracking-[0.25em] uppercase text-brand-cream/60 opacity-0 translate-y-6 transition-all duration-1000 ease-out delay-300">
                    Creative Multidisciplinary
                </p>
            </div>
        </div>

    </section>

    <!-- GSAP Animations & Adaptive Mathematics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        const spiralGroup = document.getElementById('spiral-group');

        function generateMultiSpirals() {
            spiralGroup.innerHTML = ''; // Reset layout on scale change

            const w = window.innerWidth;
            const h = window.innerHeight;
            const cx = w / 2;
            const cy = h / 2 - 40; 

            const isMobile = w < 768;

            // Tailoring vector tracks explicitly based on device footprint
            const lineCount = isMobile ? 5 : 6;        
            const offsetSpacing = isMobile ? 8 : 12;   

            for (let i = 0; i < lineCount; i++) {
                const step = i * offsetSpacing;
                let dLeft, dRight;

                if (isMobile) {
                    // 📱 PERFECT PHONE GEOMETRY: Concentric cascading frames looping within phone boundaries
                    dLeft = `M -20,${h * 0.15 + step} 
                             C ${w * 0.1},${h * 0.05 + step} ${w * 0.15},${cy - 80} ${cx - 30 + step * 0.2},${cy - 20} 
                             Q ${cx},${cy + 40 - step * 0.5} ${cx},${cy}`;

                    dRight = `M ${w + 20},${h * 0.85 - step} 
                              C ${w * 0.9},${h * 0.95 - step} ${w * 0.85},${cy + 80} ${cx + 30 - step * 0.2},${cy + 20} 
                              Q ${cx},${cy - 40 + step * 0.5} ${cx},${cy}`;
                } else {
                    // 💻 LAPTOP GEOMETRY: Sweeping, widescreen curves
                    dLeft = `M -50,${h * 0.2 + step} Q ${w * 0.22},${h * 0.05 + step} ${w * 0.33},${cy - step * 0.5} T ${cx - 50 + step * 0.3},${cy + 30 - step * 0.2} Q ${cx},${cy + 50 - step} ${cx},${cy}`;
                    dRight = `M ${w + 50},${h * 0.8 - step} Q ${w * 0.78},${h * 0.95 - step} ${w * 0.67},${cy + step * 0.5} T ${cx + 50 - step * 0.3},${cy - 30 + step * 0.2} Q ${cx},${cy - 50 + step} ${cx},${cy}`;
                }

                // Render Left Paths
                const pathLeft = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathLeft.setAttribute('d', dLeft);
                pathLeft.setAttribute('fill', 'none');
                pathLeft.setAttribute('stroke', '#f2eae1');
                pathLeft.setAttribute('stroke-width', i === 0 ? '1.25' : '0.75');
                pathLeft.setAttribute('opacity', (isMobile ? 0.35 - (i * 0.05) : 0.4 - (i * 0.05)).toString());
                pathLeft.setAttribute('class', 'spiral-line');
                spiralGroup.appendChild(pathLeft);

                // Render Right Paths
                const pathRight = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathRight.setAttribute('d', dRight);
                pathRight.setAttribute('fill', 'none');
                pathRight.setAttribute('stroke', '#f2eae1');
                pathRight.setAttribute('stroke-width', i === 0 ? '1.25' : '0.75');
                pathRight.setAttribute('opacity', (isMobile ? 0.35 - (i * 0.05) : 0.4 - (i * 0.05)).toString());
                pathRight.setAttribute('class', 'spiral-line');
                spiralGroup.appendChild(pathRight);
            }
        }

        generateMultiSpirals();
        window.addEventListener('resize', generateMultiSpirals);

        // --- SNAPPY ORIGINAL TIMING TRIGGER ---
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();

            tl.to("#portrait-wrapper", {
                opacity: 1,
                scale: 1,
                duration: 1.2,
                ease: "power4.out"
            });

            tl.fromTo(".spiral-line", 
                { strokeDasharray: "1500", strokeDashoffset: "1500" },
                { strokeDashoffset: "0", duration: 2.0, ease: "power2.inOut", stagger: 0.06 },
                "-=0.9"
            );

            tl.to("#hero-name", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=1.1");

            tl.to("#hero-tagline", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=0.8");
        });
    </script>
</body>
</html>
